<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇闪卡</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ec;--surface:#fdfcf9;--surface2:#f0ede5;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1814;--text2:#6b6760;--text3:#a09d97;
  --accent:#c9622a;--accent-bg:#fdf0e8;
  --green:#3b6d11;--green-bg:#eaf3de;
  --red:#a32d2d;--red-bg:#fcebeb;
  --amber:#854f0b;--amber-bg:#faeeda;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --radius:14px;--radius-sm:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;max-width:800px;padding:1.5rem 2rem 0;display:flex;align-items:baseline;gap:.75rem}
header h1{font-family:'Lora',serif;font-size:1.6rem;font-weight:600;letter-spacing:-.02em}
header span{font-size:13px;color:var(--text3)}
.container{width:100%;max-width:800px;padding:1.5rem 2rem 4rem}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem}
.tab{padding:7px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.tab.active{background:var(--text);color:var(--bg);border-color:transparent}
.tab:hover:not(.active){background:var(--surface2)}
.panel{display:none}.panel.active{display:block}

/* ── STUDY ── */
.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.due-badge{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid;display:inline-flex;align-items:center;gap:5px}
.due-badge.has-due{background:var(--accent-bg);color:var(--accent);border-color:#f0b090}
.due-badge.no-due{background:var(--green-bg);color:var(--green);border-color:#c0dd97}
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.progress-track{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.progress-label{font-size:13px;color:var(--text3);white-space:nowrap}
.card-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.nav-group{display:flex;gap:6px}
.nav-btn{width:36px;height:36px;border:1px solid var(--border2);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;font-size:17px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav-btn:hover{background:var(--surface2)}.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-scene{perspective:1200px;height:280px;margin-bottom:1.25rem;cursor:pointer}
.card-body{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card-scene.flipped .card-body{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04)}
.card-back-face{transform:rotateY(180deg)}
.card-hint{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem}
.card-word{font-family:'Lora',serif;font-size:3rem;font-weight:600;letter-spacing:-.03em;color:var(--text);margin-bottom:.5rem;text-align:center}
.card-word-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:.5rem}
.speak-btn{width:36px;height:36px;border:1px solid var(--border2);background:var(--surface2);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;color:var(--text2)}
.speak-btn:hover{background:var(--accent-bg);border-color:#f0b090;color:var(--accent)}
.speak-btn.speaking{background:var(--accent-bg);border-color:#f0b090;color:var(--accent);animation:pulse .6s ease infinite alternate}
.speak-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.12)}}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.card-tag{font-size:11px;background:var(--surface2);color:var(--text2);padding:3px 10px;border-radius:99px;border:1px solid var(--border)}
.card-date{font-size:11px;color:var(--text3)}
.card-level{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid}
.card-def{font-family:'DM Sans',sans-serif;font-size:1.15rem;font-weight:500;color:var(--text);text-align:center;margin-bottom:1rem;line-height:1.5}
.card-example{font-family:'Lora',serif;font-style:italic;font-size:14px;color:var(--text2);text-align:center;line-height:1.8;max-width:420px}
.card-example em{font-style:normal;font-weight:600;color:var(--accent);text-decoration:underline;text-decoration-color:rgba(201,98,42,.3);text-underline-offset:3px}
.card-next-review{font-size:12px;color:var(--text3);margin-top:.75rem}
.rating-row{display:flex;gap:8px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rate-btn{flex:1;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.rate-btn .rate-label{font-weight:500}
.rate-btn .rate-sub{font-size:11px;opacity:.7}
.rate-btn.again{color:var(--red);border-color:#f09595}.rate-btn.again:hover{background:var(--red-bg)}
.rate-btn.hard{color:var(--amber);border-color:#fac775}.rate-btn.hard:hover{background:var(--amber-bg)}
.rate-btn.good{color:var(--blue);border-color:#b5d4f4}.rate-btn.good:hover{background:var(--blue-bg)}
.rate-btn.easy{color:var(--green);border-color:#c0dd97}.rate-btn.easy:hover{background:var(--green-bg)}
.empty-card{background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--radius);height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:8px;margin-bottom:1.25rem}
.empty-card p{font-size:14px}.empty-card small{font-size:12px;color:var(--text3)}
.empty-card button{margin-top:8px;padding:7px 18px;border-radius:99px;border:1px solid var(--border2);background:var(--surface2);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);cursor:pointer}
.stats-row{display:flex;gap:6px;flex-wrap:wrap}
.stat-chip{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%}
.dot-new{background:#888}.dot-learning{background:var(--amber)}.dot-review{background:var(--blue)}.dot-mature{background:var(--green)}

/* ── FORM ── */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.form-section-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-full{margin-bottom:12px}
.form-row{display:flex;flex-direction:column;gap:5px}
.form-row label{font-size:12px;color:var(--text2);font-weight:500}
.form-row input,.form-row textarea,.form-row select{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.6}
.hint-text{font-size:11px;color:var(--text3);margin-top:3px}
.submit-btn{width:100%;padding:10px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .15s}
.submit-btn:hover{opacity:.82}

/* ── LIST ── */
.list-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.list-count{font-size:14px;color:var(--text2);margin-right:auto}
.filter-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-tag{padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s}
.filter-tag.active{background:var(--text);color:var(--bg);border-color:transparent}
.filter-tag:hover:not(.active){background:var(--surface2)}
.tag-group{margin-bottom:1.5rem}
.tag-group-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.word-list{display:flex;flex-direction:column;gap:6px}
.word-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .12s}
.word-item:hover{border-color:var(--border2)}
.word-item-row{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.word-item-left{flex:1;min-width:0}
.word-item-word{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--text)}
.word-item-def{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.word-item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.word-item-tag-pill{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);white-space:nowrap}
.word-item-due{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--accent-bg);color:var(--accent);border:1px solid #f0b090;white-space:nowrap}
.word-item-chevron{color:var(--text3);transition:transform .2s;flex-shrink:0}
.word-item-chevron svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block}
.word-item.open .word-item-chevron{transform:rotate(180deg)}
.word-item-detail{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.word-item.open .word-item-detail{display:block}
.word-item-detail-word{font-family:'Lora',serif;font-size:1.4rem;font-weight:600;color:var(--text);margin:10px 0 4px}
.word-item-detail-def{font-size:14px;color:var(--text2);margin-bottom:8px;line-height:1.6}
.word-item-detail-ex{font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:10px}
.word-item-detail-ex em{font-style:normal;font-weight:600;color:var(--accent)}
.word-item-detail-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.word-item-detail-actions{display:flex;gap:8px}
.detail-edit-btn{flex:1;padding:7px;border:1px solid var(--border2);background:transparent;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:5px}
.detail-edit-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:#b5d4f4}
.detail-del-btn{flex:1;padding:7px;border:1px solid var(--border);background:transparent;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text3);cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:5px}
.detail-del-btn:hover{background:var(--red-bg);color:var(--red);border-color:#f09595}
.detail-speak-btn{padding:7px 12px;border:1px solid var(--border);background:transparent;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text3);cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:5px}
.detail-speak-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:#f0b090}
.detail-speak-btn svg,.detail-edit-btn svg,.detail-del-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);white-space:nowrap}
.badge-level-new{background:#f1efe8;color:#888;border-color:#d3d1c7}
.badge-level-learning{background:var(--amber-bg);color:var(--amber);border-color:#fac775}
.badge-level-review{background:var(--blue-bg);color:var(--blue);border-color:#b5d4f4}
.badge-level-mature{background:var(--green-bg);color:var(--green);border-color:#c0dd97}
.del-btn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--text3);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.del-btn:hover{background:var(--red-bg);color:var(--red)}
.del-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.list-action-btn{font-size:13px;color:var(--text3);background:transparent;border:1px solid var(--border);padding:5px 12px;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.list-action-btn:hover{background:var(--surface2);color:var(--text2)}
.list-action-btn.danger:hover{background:var(--red-bg);color:var(--red);border-color:#f09595}
.empty-list{text-align:center;padding:3rem;color:var(--text3);font-size:14px;line-height:2}

/* ── EBBINGHAUS INFO ── */
.eb-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.eb-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.eb-steps{display:flex;gap:0;position:relative}
.eb-steps::before{content:'';position:absolute;top:14px;left:0;right:0;height:2px;background:var(--border2);z-index:0}
.eb-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1}
.eb-dot{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text2)}
.eb-dot.done{background:var(--green-bg);border-color:#c0dd97;color:var(--green)}
.eb-dot.current{background:var(--accent-bg);border-color:#f0b090;color:var(--accent)}
.eb-day{font-size:10px;color:var(--text3);text-align:center}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);font-size:13px;padding:8px 20px;border-radius:99px;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EDIT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;opacity:0;transition:opacity .2s}
.modal-overlay.show{opacity:1}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:480px;transform:translateY(12px);transition:transform .2s;max-height:90vh;overflow-y:auto}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.modal-close{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);line-height:1}
.modal-close:hover{background:var(--surface2)}
.modal-footer{display:flex;gap:8px;margin-top:1.25rem}
.modal-save{flex:1;padding:9px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.modal-save:hover{opacity:.82}
.modal-cancel{padding:9px 16px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:background .12s}
.modal-cancel:hover{background:var(--surface2)}
.edit-btn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--text3);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.edit-btn:hover{background:var(--blue-bg);color:var(--blue)}
.edit-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(max-width:600px){
  .container{padding:1rem}.header{padding:1rem 1rem 0}
  .card-word{font-size:2.2rem}.form-grid{grid-template-columns:1fr}
  .rate-btn .rate-sub{display:none}
}
</style>
</head>
<body>
<header>
  <h1>词汇闪卡</h1>
  <span id="header-count">0 个单词</span>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('study')">📖 学习</button>
    <button class="tab" onclick="switchTab('add')">＋ 添加</button>
    <button class="tab" onclick="switchTab('list')">☰ 单词库</button>
  </div>

  <!-- ══ STUDY ══ -->
  <div id="panel-study" class="panel active">
    <div class="study-header">
      <div class="due-badge" id="due-badge"></div>
      <div class="stats-row" id="stats-row"></div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
    <div class="card-nav">
      <div></div>
      <div class="nav-group">
        <button class="nav-btn" id="btn-prev" onclick="prevCard()" title="上一张">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="nav-btn" onclick="reloadDue()" title="重新加载今日单词">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button class="nav-btn" id="btn-next" onclick="nextCard()" title="下一张">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
    <div id="study-area"></div>
    <div class="rating-row" id="rating-row" style="display:none">
      <button class="rate-btn again" onclick="rateCard(0)"><span class="rate-label">✕ 忘了</span><span class="rate-sub">10分钟后</span></button>
      <button class="rate-btn hard" onclick="rateCard(1)"><span class="rate-label">△ 困难</span><span class="rate-sub" id="sub-hard"></span></button>
      <button class="rate-btn good" onclick="rateCard(2)"><span class="rate-label">○ 良好</span><span class="rate-sub" id="sub-good"></span></button>
      <button class="rate-btn easy" onclick="rateCard(3)"><span class="rate-label">★ 轻松</span><span class="rate-sub" id="sub-easy"></span></button>
    </div>
  </div>

  <!-- ══ ADD ══ -->
  <div id="panel-add" class="panel">
    <div class="form-card">
      <div class="form-section-title">添加新单词</div>
      <div class="form-grid">
        <div class="form-row">
          <label for="inp-word">单词 *</label>
          <input id="inp-word" type="text" placeholder="e.g. ephemeral" autocomplete="off">
        </div>
        <div class="form-row">
          <label for="inp-date">添加日期</label>
          <input id="inp-date" type="date">
        </div>
      </div>
      <div class="form-full form-row">
        <label for="inp-def">释义 *</label>
        <input id="inp-def" type="text" placeholder="e.g. 短暂的；转瞬即逝的">
      </div>
      <div class="form-full form-row">
        <label for="inp-example">例句</label>
        <textarea id="inp-example" placeholder="e.g. Beauty is **ephemeral**, but memory lasts."></textarea>
        <span class="hint-text">用 **单词** 包住关键词可高亮显示</span>
      </div>
      <div class="form-full form-row">
        <label for="inp-tag">标签（分类）</label>
        <input id="inp-tag" type="text" placeholder="e.g. 四级 / 雅思 / 文学">
        <span class="hint-text">用于在单词库中按分类筛选</span>
      </div>
      <button class="submit-btn" onclick="addWord()">添加单词</button>
    </div>
  </div>

  <!-- ══ LIST ══ -->
  <div id="panel-list" class="panel">
    <div class="list-toolbar">
      <span class="list-count" id="list-count">共 0 个单词</span>
      <button class="list-action-btn" onclick="exportWords()">导出</button>
      <button class="list-action-btn" onclick="importClick()">导入</button>
      <button class="list-action-btn danger" onclick="clearAll()">清空</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importWords(event)">
    </div>
    <div class="filter-tags" id="filter-tags"></div>
    <div id="word-list-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-overlay" onclick="closeEdit(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span>编辑单词</span>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label for="edit-word">单词 *</label>
        <input id="edit-word" type="text" autocomplete="off">
      </div>
      <div class="form-row">
        <label for="edit-date">添加日期</label>
        <input id="edit-date" type="date">
      </div>
    </div>
    <div class="form-full form-row" style="margin-bottom:12px">
      <label for="edit-def">释义 *</label>
      <input id="edit-def" type="text">
    </div>
    <div class="form-full form-row" style="margin-bottom:12px">
      <label for="edit-example">例句</label>
      <textarea id="edit-example"></textarea>
      <span class="hint-text">用 **单词** 包住关键词可高亮显示</span>
    </div>
    <div class="form-full form-row">
      <label for="edit-tag">标签</label>
      <input id="edit-tag" type="text">
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeEditModal()">取消</button>
      <button class="modal-save" onclick="saveEdit()">保存修改</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  SPACED REPETITION (SM-2 variant)
//  intervals: [1,3,7,14,30,60,120...] days
// ══════════════════════════════════════════
const INTERVALS = [1, 3, 7, 14, 30, 60, 120, 180];

function today() {
  return new Date().toISOString().slice(0, 10);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function intervalLabel(days) {
  if (days < 1) return '10分钟';
  if (days === 1) return '明天';
  if (days < 7) return days + '天后';
  if (days < 30) return Math.round(days/7) + '周后';
  return Math.round(days/30) + '个月后';
}

// rating: 0=again,1=hard,2=good,3=easy
function nextInterval(word, rating) {
  const step = word.step || 0;
  if (rating === 0) {
    return { step: 0, interval: 0, nextDate: today(), ease: Math.max(1.3, (word.ease||2.5)-0.2) };
  }
  let ease = word.ease || 2.5;
  let newStep = step;
  if (rating === 1) { ease = Math.max(1.3, ease - 0.15); newStep = Math.max(0, step - 1); }
  else if (rating === 2) { newStep = step + 1; }
  else { ease = Math.min(3.0, ease + 0.15); newStep = step + 2; }
  newStep = Math.min(newStep, INTERVALS.length - 1);
  const interval = INTERVALS[newStep];
  return { step: newStep, interval, nextDate: addDays(today(), interval), ease };
}

function getLevel(word) {
  if (!word.nextDate) return 'new';
  const step = word.step || 0;
  if (step === 0) return 'learning';
  if (step <= 2) return 'review';
  return 'mature';
}

function isDue(word) {
  if (!word.nextDate) return true;
  return word.nextDate <= today();
}

// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
const STORAGE_KEY = 'vocab_flashcards_v2';
let words = [], nextId = 100, queue = [], qIdx = 0, isFlipped = false;

const DEFAULT_WORDS = [
  {id:1,word:"ephemeral",def:"短暂的；转瞬即逝的",example:"Beauty is **ephemeral**, but the memory lasts forever.",tag:"文学",addedAt:"2026-06-01",step:0,ease:2.5,nextDate:null,interval:0},
  {id:2,word:"ubiquitous",def:"无处不在的；普遍存在的",example:"Smartphones have become **ubiquitous** in modern life.",tag:"四级",addedAt:"2026-05-30",step:2,ease:2.5,nextDate:"2026-06-02",interval:7},
  {id:3,word:"serendipity",def:"意外发现美好事物的运气",example:"Finding that café was pure **serendipity**.",tag:"文学",addedAt:"2026-05-28",step:0,ease:2.5,nextDate:null,interval:0},
  {id:4,word:"resilient",def:"有适应力的；能迅速恢复的",example:"She proved to be a **resilient** leader during the crisis.",tag:"雅思",addedAt:"2026-05-25",step:3,ease:2.6,nextDate:"2026-06-05",interval:14},
  {id:5,word:"meticulous",def:"一丝不苟的；极其仔细的",example:"He was **meticulous** in his research, checking every detail.",tag:"考研",addedAt:"2026-05-20",step:1,ease:2.3,nextDate:"2026-06-01",interval:3}
];

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const d = JSON.parse(s); words = d.words||[]; nextId = d.nextId||100; }
    else { words = JSON.parse(JSON.stringify(DEFAULT_WORDS)); }
  } catch(e) { words = JSON.parse(JSON.stringify(DEFAULT_WORDS)); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({words, nextId})); } catch(e) {}
}

// ══════════════════════════════════════════
//  STUDY
// ══════════════════════════════════════════
function buildQueue() {
  queue = words.filter(isDue);
  // sort: new first, then by nextDate
  queue.sort((a, b) => {
    if (!a.nextDate && b.nextDate) return -1;
    if (a.nextDate && !b.nextDate) return 1;
    return (a.nextDate||'') < (b.nextDate||'') ? -1 : 1;
  });
  qIdx = 0;
}

function reloadDue() { buildQueue(); renderStudy(); toast('已加载今日待复习单词'); }

function renderStudyPanel() {
  // due badge
  const badge = document.getElementById('due-badge');
  const dueCount = words.filter(isDue).length;
  if (dueCount === 0) {
    badge.className = 'due-badge no-due';
    badge.textContent = '✓ 今日已完成';
  } else {
    badge.className = 'due-badge has-due';
    badge.textContent = '⏰ 今日待复习：' + dueCount + ' 个';
  }

  // stats
  const levels = {new:0,learning:0,review:0,mature:0};
  words.forEach(w => levels[getLevel(w)]++);
  const sr = document.getElementById('stats-row');
  sr.innerHTML = [
    levels.new ? `<div class="stat-chip"><div class="dot dot-new"></div>${levels.new} 新</div>` : '',
    levels.learning ? `<div class="stat-chip"><div class="dot dot-learning"></div>${levels.learning} 学习中</div>` : '',
    levels.review ? `<div class="stat-chip"><div class="dot dot-review"></div>${levels.review} 复习中</div>` : '',
    levels.mature ? `<div class="stat-chip"><div class="dot dot-mature"></div>${levels.mature} 已掌握</div>` : '',
  ].join('');
}

function renderStudy() {
  renderStudyPanel();
  const el = document.getElementById('study-area');
  const rr = document.getElementById('rating-row');
  isFlipped = false;
  rr.style.display = 'none';

  if (!queue.length) {
    const dueCount = words.filter(isDue).length;
    el.innerHTML = `<div class="empty-card">
      ${dueCount > 0
        ? `<p>🎉 本轮完成！</p><small>点击刷新加载剩余 ${dueCount} 个</small><button onclick="reloadDue()">继续学习</button>`
        : words.length
          ? `<p>✅ 今日全部完成！</p><small>明天再来复习吧</small>`
          : `<p>暂无单词</p><button onclick="switchTab('add')">＋ 添加第一个单词</button>`
      }
    </div>`;
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-label').textContent = '0 / 0';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }

  const w = queue[qIdx];
  const exHtml = (w.example||'').replace(/\*\*(.+?)\*\*/g, '<em>$1</em>');
  const level = getLevel(w);
  const levelNames = {new:'新单词',learning:'学习中',review:'复习中',mature:'已掌握'};
  const levelClass = 'badge-level-' + level;
  const pct = queue.length > 1 ? Math.round(qIdx / (queue.length - 1) * 100) : 100;

  // preview next intervals for buttons
  const ni = { hard: nextInterval(w,1), good: nextInterval(w,2), easy: nextInterval(w,3) };
  document.getElementById('sub-hard').textContent = intervalLabel(ni.hard.interval);
  document.getElementById('sub-good').textContent = intervalLabel(ni.good.interval);
  document.getElementById('sub-easy').textContent = intervalLabel(ni.easy.interval);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (qIdx+1) + ' / ' + queue.length;
  document.getElementById('btn-prev').disabled = qIdx === 0;
  document.getElementById('btn-next').disabled = qIdx === queue.length - 1;

  // ebbinghaus progress dots
  const totalSteps = INTERVALS.length;
  const step = w.step || 0;
  const dotsHtml = INTERVALS.map((days, i) => {
    let cls = i < step ? 'done' : i === step ? 'current' : '';
    const label = days < 7 ? days+'天' : days < 30 ? Math.round(days/7)+'周' : Math.round(days/30)+'月';
    return `<div class="eb-step"><div class="eb-dot ${cls}">${i+1}</div><div class="eb-day">${label}</div></div>`;
  }).join('');

  el.innerHTML = `
    <div class="eb-info" style="margin-bottom:1rem">
      <div class="eb-title">📈 艾宾浩斯进度</div>
      <div class="eb-steps">${dotsHtml}</div>
    </div>
    <div class="card-scene" id="flashcard" onclick="flipCard()">
      <div class="card-body">
        <div class="card-face">
          <span class="card-hint">点击翻转查看释义</span>
          <div class="card-word-row">
            <div class="card-word">${w.word}</div>
            <button class="speak-btn" onclick="speakWord(event,'${w.word}')" title="朗读">
              <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
          </div>
          <div class="card-meta">
            <span class="badge ${levelClass}">${levelNames[level]}</span>
            ${w.tag ? `<span class="card-tag">${w.tag}</span>` : ''}
            ${w.addedAt ? `<span class="card-date">📅 ${w.addedAt}</span>` : ''}
          </div>
        </div>
        <div class="card-face card-back-face">
          <span class="card-hint">释义</span>
          <div class="card-def">${w.def}</div>
          ${w.example ? `<div class="card-example">${exHtml}</div>` : ''}
          ${w.nextDate ? `<div class="card-next-review">上次复习：${w.nextDate} · 当前间隔：${w.interval||0}天</div>` : ''}
        </div>
      </div>
    </div>`;
}

function flipCard() {
  const scene = document.getElementById('flashcard');
  if (!scene) return;
  scene.classList.toggle('flipped');
  isFlipped = !isFlipped;
  document.getElementById('rating-row').style.display = isFlipped ? 'flex' : 'none';
}

function nextCard() { if (qIdx < queue.length-1) { qIdx++; renderStudy(); } }
function prevCard() { if (qIdx > 0) { qIdx--; renderStudy(); } }

function rateCard(rating) {
  const w = queue[qIdx];
  const ni = nextInterval(w, rating);
  // update word in words array
  const wi = words.findIndex(x => x.id === w.id);
  if (wi >= 0) {
    words[wi].step = ni.step;
    words[wi].ease = ni.ease;
    words[wi].nextDate = ni.nextDate;
    words[wi].interval = ni.interval;
  }
  save();

  const msgs = ['记忆模糊，10分钟后再见 👋','标记为困难，间隔缩短','好的，按计划复习 ✓','轻松掌握，间隔延长 🚀'];
  toast(msgs[rating]);

  // remove from queue if not "again"
  if (rating === 0) {
    // put back at end for within-session review
    queue.push(queue[qIdx]);
    queue.splice(qIdx, 1);
    if (qIdx >= queue.length) qIdx = queue.length - 1;
  } else {
    queue.splice(qIdx, 1);
    if (qIdx >= queue.length) qIdx = Math.max(0, queue.length-1);
  }
  renderStudy();
}

// ══════════════════════════════════════════
//  ADD
// ══════════════════════════════════════════
function addWord() {
  const word = document.getElementById('inp-word').value.trim();
  const def = document.getElementById('inp-def').value.trim();
  if (!word) { toast('请填写单词'); return; }
  if (!def) { toast('请填写释义'); return; }
  const w = {
    id: nextId++, word, def,
    example: document.getElementById('inp-example').value.trim(),
    tag: document.getElementById('inp-tag').value.trim(),
    addedAt: document.getElementById('inp-date').value || today(),
    step: 0, ease: 2.5, nextDate: null, interval: 0
  };
  words.push(w);
  save();
  buildQueue();
  ['inp-word','inp-def','inp-example','inp-tag'].forEach(id => document.getElementById(id).value='');
  document.getElementById('inp-date').value = today();
  toast('「'+word+'」已添加，加入今日学习队列');
  renderStudy();
  updateHeader();
}

// ══════════════════════════════════════════
//  LIST
// ══════════════════════════════════════════
let activeFilter = '__all__';

function getAllTags() {
  const set = new Set();
  words.forEach(w => { if (w.tag) w.tag.split(/[,，/／\s]+/).forEach(t => { if(t.trim()) set.add(t.trim()); }); });
  return [...set].sort();
}

function renderList() {
  document.getElementById('list-count').textContent = '共 ' + words.length + ' 个单词';
  const tags = getAllTags();

  // filter bar
  const ft = document.getElementById('filter-tags');
  ft.innerHTML = [
    `<button class="filter-tag ${activeFilter==='__all__'?'active':''}" onclick="setFilter('__all__')">全部 (${words.length})</button>`,
    `<button class="filter-tag ${activeFilter==='__due__'?'active':''}" onclick="setFilter('__due__')">今日待学 (${words.filter(isDue).length})</button>`,
    ...tags.map(t => {
      const cnt = words.filter(w => w.tag && w.tag.split(/[,，/／\s]+/).map(x=>x.trim()).includes(t)).length;
      return `<button class="filter-tag ${activeFilter===t?'active':''}" onclick="setFilter('${t}')">${t} (${cnt})</button>`;
    })
  ].join('');

  // filtered words
  let filtered = words;
  if (activeFilter === '__due__') filtered = words.filter(isDue);
  else if (activeFilter !== '__all__') filtered = words.filter(w => w.tag && w.tag.split(/[,，/／\s]+/).map(x=>x.trim()).includes(activeFilter));

  const container = document.getElementById('word-list-container');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-list">此分类下暂无单词</div>';
    return;
  }

  // group by tag when showing all
  if (activeFilter === '__all__') {
    // group
    const groups = {};
    words.forEach(w => {
      const t = w.tag || '（未分类）';
      if (!groups[t]) groups[t] = [];
      groups[t].push(w);
    });
    container.innerHTML = Object.entries(groups).sort(([a],[b])=>a<b?-1:1).map(([tag, ws], gi) => `
      <div class="tag-group">
        <div class="tag-group-title">${tag} · ${ws.length} 个</div>
        <div class="word-list">${ws.map((w,i) => wordItemHtml(w, words.indexOf(w))).join('')}</div>
      </div>`).join('');
  } else {
    container.innerHTML = `<div class="word-list">${filtered.map(w => wordItemHtml(w, words.indexOf(w))).join('')}</div>`;
  }
}

function wordItemHtml(w, i) {
  const level = getLevel(w);
  const levelNames = {new:'新',learning:'学习中',review:'复习',mature:'掌握'};
  const levelClass = 'badge-level-' + level;
  const due = isDue(w);
  const exHtml = (w.example||'').replace(/\*\*(.+?)\*\*/g, '<em>$1</em>');
  return `<div class="word-item" id="wi-${i}">
    <div class="word-item-row" onclick="toggleItem(${i})">
      <div class="word-item-left">
        <div class="word-item-word">${w.word}</div>
        <div class="word-item-def">${w.def}</div>
      </div>
      <div class="word-item-right">
        ${due ? '<span class="word-item-due">今日</span>' : ''}
        ${w.tag ? `<span class="word-item-tag-pill">${w.tag}</span>` : ''}
      </div>
      <div class="word-item-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="word-item-detail">
      <div class="word-item-detail-word">${w.word}</div>
      <div class="word-item-detail-def">${w.def}</div>
      ${w.example ? `<div class="word-item-detail-ex">${exHtml}</div>` : ''}
      <div class="word-item-detail-meta">
        <span class="badge ${levelClass}">${levelNames[level]}</span>
        ${w.addedAt ? `<span class="badge">📅 ${w.addedAt}</span>` : ''}
        ${w.interval ? `<span class="badge">间隔 ${w.interval}天</span>` : ''}
      </div>
      <div class="word-item-detail-actions">
        <button class="detail-speak-btn" onclick="speakWord(event,'${w.word}')">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> 朗读
        </button>
        <button class="detail-edit-btn" onclick="openEdit(${i})">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 编辑
        </button>
        <button class="detail-del-btn" onclick="deleteWord(${i})">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> 删除
        </button>
      </div>
    </div>
  </div>`;
}

function toggleItem(i) {
  const el = document.getElementById('wi-' + i);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  // close all others
  document.querySelectorAll('.word-item.open').forEach(x => x.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function setFilter(f) { activeFilter = f; renderList(); }

function deleteWord(i) {
  const name = words[i].word;
  words.splice(i, 1);
  save(); buildQueue(); renderStudy(); renderList(); updateHeader();
  toast('已删除「'+name+'」');
}
function clearAll() {
  if (!words.length) return;
  if (!confirm('确定清空所有单词？')) return;
  words = []; save(); buildQueue(); renderStudy(); renderList(); updateHeader();
  toast('已清空');
}
function exportWords() {
  if (!words.length) { toast('暂无单词可导出'); return; }
  const blob = new Blob([JSON.stringify({words,nextId,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='flashcards_'+today()+'.json'; a.click();
  toast('已导出 '+words.length+' 个单词');
}
function importClick() { document.getElementById('import-file').click(); }
function importWords(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = data.words || data;
      if (!Array.isArray(imported)) { toast('格式不正确'); return; }
      imported.forEach(w => { w.id = nextId++; words.push(w); });
      save(); buildQueue(); renderStudy(); renderList(); updateHeader();
      toast('导入了 '+imported.length+' 个单词');
    } catch { toast('解析失败'); }
  };
  reader.readAsText(file); e.target.value='';
}

function updateHeader() { document.getElementById('header-count').textContent = words.length+' 个单词'; }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['study','add','list'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if (name==='list') renderList();
}


// ══════════════════════════════════════════
//  EDIT
// ══════════════════════════════════════════
let editingIdx = -1;
function openEdit(i) {
  editingIdx = i;
  const w = words[i];
  document.getElementById('edit-word').value = w.word || '';
  document.getElementById('edit-def').value = w.def || '';
  document.getElementById('edit-example').value = w.example || '';
  document.getElementById('edit-tag').value = w.tag || '';
  document.getElementById('edit-date').value = w.addedAt || today();
  const overlay = document.getElementById('edit-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('show'));
  document.getElementById('edit-word').focus();
}
function closeEditModal() {
  const overlay = document.getElementById('edit-overlay');
  overlay.classList.remove('show');
  setTimeout(() => { overlay.style.display = 'none'; }, 200);
  editingIdx = -1;
}
function closeEdit(e) {
  if (e.target === document.getElementById('edit-overlay')) closeEditModal();
}
function saveEdit() {
  const word = document.getElementById('edit-word').value.trim();
  const def = document.getElementById('edit-def').value.trim();
  if (!word) { toast('请填写单词'); return; }
  if (!def) { toast('请填写释义'); return; }
  words[editingIdx].word = word;
  words[editingIdx].def = def;
  words[editingIdx].example = document.getElementById('edit-example').value.trim();
  words[editingIdx].tag = document.getElementById('edit-tag').value.trim();
  words[editingIdx].addedAt = document.getElementById('edit-date').value || today();
  save();
  buildQueue();
  renderStudy();
  renderList();
  closeEditModal();
  toast('「' + word + '」已更新 ✓');
}

// ══════════════════════════════════════════
//  TEXT-TO-SPEECH
// ══════════════════════════════════════════
let currentUtterance = null;
function speakWord(e, word) {
  e.stopPropagation();
  if (!('speechSynthesis' in window)) { toast('当前浏览器不支持语音'); return; }
  window.speechSynthesis.cancel();
  const btn = e.currentTarget;
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1;
  // pick an English voice if available
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;
  utter.onstart = () => btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utter);
  currentUtterance = utter;
}

let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

document.addEventListener('keydown', e => {
  if (document.querySelector('.panel.active')?.id !== 'panel-study') return;
  if (e.key==='ArrowLeft') prevCard();
  else if (e.key==='ArrowRight') nextCard();
  else if (e.key===' ') { e.preventDefault(); flipCard(); }
  else if (e.key==='1') rateCard(0);
  else if (e.key==='2') rateCard(1);
  else if (e.key==='3') rateCard(2);
  else if (e.key==='4') rateCard(3);
});

document.getElementById('edit-overlay').style.display='none';
// INIT
load();
document.getElementById('inp-date').value = today();
buildQueue();
renderStudy();
updateHeader();
</script>
